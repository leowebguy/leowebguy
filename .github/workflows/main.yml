name: leowebguy.com

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'dist'
      - 'README.md'

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --no-audit --legacy-peer-deps
      - run: npm run prod
        env:
          WEBPACK_RECAPTCHA_KEY: ${{ vars.WEBPACK_RECAPTCHA_KEY }}
          WEBPACK_TURNSTILE_KEY: ${{ vars.WEBPACK_TURNSTILE_KEY }}
          GITHUB_RUN_ID : ${{ github.run_id }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - uses: actions/deploy-pages@v4
        id: deployment
