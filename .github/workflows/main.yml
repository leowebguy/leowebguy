name: leowebguy.com

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'dist'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci --no-audit --legacy-peer-deps
      - run: npm run prod
        env:
          WEBPACK_RECAPTCHA_KEY: ${{ vars.WEBPACK_RECAPTCHA_KEY }}
          WEBPACK_TURNSTILE_KEY: ${{ vars.WEBPACK_TURNSTILE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
      - uses: actions/deploy-pages@v5
        id: deployment
